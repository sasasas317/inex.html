<body>

    <div class="regist">

        <h1>Регистрация</h1>
        <form class="reg" id="reg_form">
            
            <!-- логин -->
            <p>
                <input type="text" 
                       name="username" 
                       id="reg_username" 
                       placeholder="Введите имя" 
                       required>
            </p>
            
            <!-- Email -->
            <p>
                <input type="email" 
                       name="email" 
                       id="reg_email" 
                       placeholder="Введите email"
                       class="email" 
                       required>
                       
            </p>
            
            <!-- Пароль -->
            <p>
                <input type="password" 
                       name="password" 
                       id="reg_password" 
                       placeholder="Введите пароль" 
                       required 
                       minlength="6">
            </p>
            
            
            <!-- Чекбоксы  -->
            <p>
                <input type="checkbox" name="agree" id="agree_terms" required> 
                <label for="agree_terms">Согласен на обработку персональных данных</label>
            </p>
            
            <p>
                <input type="checkbox" name="notifications" id="notify-updates"> 
                <label for="notify-updates">Присылать уведомления о новых изменениях</label>
            </p>
            
            <!-- Кнопка с type="submit" -->
            <p>
                <button type="submit" id="reg_btn">Зарегистрироваться</button>
            </p>
            
        </form>


    </div>
    <script src="index.js"></script>
</body>
</html>
